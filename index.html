  <style>
    :root {
      --primary: #2C7A7B;
      --primary-dark: #234E52;

      --bg: #ffffff;
      --bg-soft: #f8fafc;
      --border: #e5e7eb;

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;

    body {
      font-family: Inter, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;

    a {
      color: inherit;
      text-decoration: none;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 0 24px;
    }

    header {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(255,255,255,.95);
      border-bottom: 1px solid var(--border);
      z-index: 10;
    }

    nav {
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    nav a {
      margin-left: 24px;
      font-weight: 500;
      color: var(--muted);
    }

    nav a:hover {
      color: var(--primary);
    }

    section {
      padding: 96px 0;
    }

    #hero {
      padding-top: 160px;
    }

    h2 {

    }

    p {

      margin-bottom: 16px;
    }
